<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Waste Classifier</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Segoe UI',sans-serif;
background:linear-gradient(135deg,#eef2f3,#dfe9f3);
}

/* NAVBAR */
.navbar{
background:white;
padding:15px 40px;
box-shadow:0 4px 15px rgba(0,0,0,0.05);
}

/* HERO */
.hero{
text-align:center;
margin-top:60px;
}

.hero h2{
font-weight:700;
}

/* CARD */
.main-card{
background:white;
padding:40px;
border-radius:20px;
box-shadow:0 15px 35px rgba(0,0,0,0.1);
width:55%;
margin:auto;
transition:0.3s;
}

/* UPLOAD */
.upload-box{
border:2px dashed #bbb;
border-radius:15px;
padding:30px;
cursor:pointer;
transition:0.3s;
}

.upload-box:hover{
border-color:#198754;
background:#f0fff5;
}

/* IMAGE */
.preview{
display:none;
margin:20px auto;
max-width:260px;
border-radius:12px;
box-shadow:0 10px 25px rgba(0,0,0,0.2);
}

/* BUTTON */
.btn-analyze{
margin-top:15px;
width:100%;
padding:12px;
font-weight:600;
border-radius:10px;
}

/* RESULT */
.result-box{
display:none;
margin-top:25px;
}

.result-text{
font-size:22px;
font-weight:600;
}

/* PROGRESS */
.progress{
height:22px;
border-radius:20px;
overflow:hidden;
}

/* CATEGORY */
.categories{
margin-top:70px;
padding:20px;
}

.card-cat{
background:white;
padding:25px;
border-radius:15px;
text-align:center;
box-shadow:0 5px 15px rgba(0,0,0,0.05);
transition:0.3s;
font-weight:500;
}

.card-cat:hover{
transform:translateY(-8px);
box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

/* LOADING */
.loading{
display:none;
margin-top:15px;
}

</style>

</head>

<body>

<!-- NAVBAR -->
<div class="navbar d-flex justify-content-between align-items-center">
<h4 class="text-success fw-bold m-0">♻ AI Waste Classifier</h4>
<span class="text-muted">Smart Recycling Assistant</span>
</div>

<!-- HERO -->
<div class="hero">

<h2>AI-Powered Waste Detection</h2>
<p class="text-muted">Upload an image and instantly classify waste into categories</p>

<div class="main-card">

<!-- UPLOAD -->
<div class="upload-box" onclick="fileInput.click()">
<p class="mb-2">📂 Drag & drop or click to upload</p>
<button class="btn btn-success">Select Image</button>
<p class="text-muted mt-2">Supports JPG, PNG • Max 10MB</p>
<input type="file" id="fileInput" hidden>
</div>

<!-- IMAGE -->
<img id="preview" class="preview">

<!-- BUTTON -->
<button class="btn btn-success btn-analyze" onclick="uploadImage()">
Analyze Waste
</button>

<!-- LOADING -->
<div class="loading text-center" id="loading">
<div class="spinner-border text-success"></div>
<p class="mt-2">Analyzing image...</p>
</div>

<!-- RESULT -->
<div class="result-box text-center" id="resultBox">
<h4 class="result-text" id="predictionText"></h4>

<div class="progress w-75 mx-auto mt-3">
<div id="progressBar" class="progress-bar bg-success"></div>
</div>
</div>

</div>
</div>

<!-- CATEGORIES -->
<div class="container categories">

<h3 class="text-center fw-bold">Waste Categories</h3>

<div class="row mt-4 g-4">

<div class="col-md-4"><div class="card-cat">📦 Cardboard</div></div>
<div class="col-md-4"><div class="card-cat">💧 Plastic</div></div>
<div class="col-md-4"><div class="card-cat">📄 Paper</div></div>
<div class="col-md-4"><div class="card-cat">🔩 Metal</div></div>
<div class="col-md-4"><div class="card-cat">🍷 Glass</div></div>
<div class="col-md-4"><div class="card-cat">🗑 Trash</div></div>

</div>

</div>

<script>

const fileInput = document.getElementById("fileInput")
const preview = document.getElementById("preview")
const loading = document.getElementById("loading")
const resultBox = document.getElementById("resultBox")
const predictionText = document.getElementById("predictionText")
const progressBar = document.getElementById("progressBar")

fileInput.onchange = () => {
    const file = fileInput.files[0]
    if(file){
        preview.src = URL.createObjectURL(file)
        preview.style.display = "block"
    }
}

async function uploadImage(){

    const file = fileInput.files[0]

    if(!file){
        alert("Upload image first")
        return
    }

    loading.style.display = "block"
    resultBox.style.display = "none"

    let formData = new FormData()
    formData.append("image", file)

    try{

        const response = await fetch("https://waste-backend-1-6yfb.onrender.com/predict", {
            method:"POST",
            body:formData
        })

        const data = await response.json()

        loading.style.display = "none"
        resultBox.style.display = "block"

        predictionText.innerText = `Detected: ${data.prediction.toUpperCase()}`

        progressBar.style.width = data.confidence + "%"
        progressBar.innerText = data.confidence + "%"

    }catch(error){
        loading.style.display = "none"
        alert("Server error. Please try again.")
        console.log(error)
    }
}

</script>

</body>
</html>
